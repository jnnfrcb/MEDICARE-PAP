<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="TidakLogin.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">
                <a href="LandingPage.html">MediCare</a>
            </div>
        </div>
        <div class="nav-right">
            <a href="#" class="btn-bantuan">Bantuan</a>
            <a href="Login.html" class="btn-profil" style="background-color:var(--green-hover)">Masuk</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Daftar</h2>

            <form>
                <div class="form-group">
                    <label>Nama</label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>Alamat</label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>No. Telepon</label>
                    <input type="tel" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" required>
                </div>

                <div class="form-group">
                    <label>Kata Sandi</label>
                    <input type="password" required>
                </div>

                <div class="auth-redirect">
                    Sudah memiliki akun? <a href="Login.html">Masuk</a>
                </div>

                <div class="auth-actions">
                    <a href="LandingPage.html">
                        <button type="button" class="btn-back">Kembali</button>
                    </a>
                    <a href="Login.html">
                        <button type="button" class="btn-submit">Daftar</button>
                    </a>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-top">
            <div class="footer-info">
                <h2>MediCare</h2>
                <p>Layanan kesehatan digital yang lebih mudah diakses, terjangkau, dan berkualitas tinggi untuk semua
                    orang.</p>
            </div>
            <div class="footer-socials">
                <a href="#" class="social-icon"><i class="fa-solid fa-phone"></i></a>
                <a href="#" class="social-icon"><i class="fa-regular fa-envelope"></i></a>
                <a href="#" class="social-icon"><i class="fa-solid fa-share-nodes"></i></a>
            </div>
        </div>
        <div class="footer-bottom">
            &copy; 2026 <strong>MediCare</strong> Sistem Kesehatan. Seluruh hak dilindungi undang-undang.
        </div>
    </footer>

</body>

</html>
